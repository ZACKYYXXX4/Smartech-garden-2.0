<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Mulai Bertani</title>
  <link rel="stylesheet" href="assets/css/start.css">
  <link rel="icon" type="image/png" href="assets/images/WhatsApp Image 2025-09-08 at 23.10.24_2c0a5fd1.jpg">
</head>
<body>

<!-- Navigation -->
<div class="navigation">
  <a href="index.html" class="nav-link">🏠 Dashboard</a>
  <a href="history_pages.html" class="nav-link">📜 History</a>
  <a href="profile.html" class="nav-link">👤 Profile</a>
  <a href="settings.html" class="nav-link">⚙️ Settings</a>
</div>

<div class="container">

  <!-- SEARCH -->
  <input id="searchInput" placeholder="🔍 Cari tanaman...">

  <!-- LIST -->
  <div id="plantList" class="grid"></div>

  <!-- DETAIL -->
  <div id="detailBox" class="detail hidden">
    <img id="detailImg">

    <div class="detail-content">
      <h2 id="detailNama"></h2>
      <p id="detailDesc"></p>
      <p id="detailCare"></p>

      <button id="startBtn">🌱 Mulai Tanam</button>
    </div>
  </div>

  <!-- CONNECT -->
  <div class="connect">
    <button id="connectBtn">🔵 Connect Tools</button>
  </div>

  <!-- CAMERA -->
  <div class="camera">
    <input type="file" id="cameraInput" accept="image/*" capture="environment">
    <button id="analyzeBtn">📸 Analisa Tanaman</button>
    <p id="aiResult"></p>
  </div>

</div>

<script type="module" src="assets/js/start.js"></script>
</body>
</html>
