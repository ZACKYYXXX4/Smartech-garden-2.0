<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Mulai Bertani</title>
  <link rel="stylesheet" href="assets/css/start.css">
</head>
<body>

<div class="container">

  <!-- 🔍 TOP BOX -->
  <div class="top-box">

    <input id="searchInput" placeholder="🔍 Cari tanaman...">

    <!-- GRID -->
    <div id="plantList" class="grid"></div>

  </div>

  <!-- 📄 DETAIL (INI YANG BALIKIN 🔥) -->
  <div id="detailBox" class="detail hidden">
    
    <img id="detailImg">

    <div class="detail-content">
      <h2 id="detailNama"></h2>
      <p id="detailDesc"></p>
      <p id="detailCare"></p>

      <button id="startBtn">🌱 Mulai Tanam</button>
    </div>

  </div>

  <!-- 🔵 CONNECT -->
  <div class="connect-box">
    <h2>🔵 Tools Connect</h2>
    <button onclick="connectBluetooth()">Connect ESP</button>
  </div>

</div>

<!-- 📸 BOTTOM BAR -->
<div class="bottom-bar">

  <a href="index.html" class="nav-link">🏠 Dashboard</a>
  <a href="history_pages.html" class="nav-link">📜 History</a>

  <div class="camera-btn">
    <input type="file" id="cameraInput" accept="image/*" capture="environment"> 
    <button onclick="analyzeImage()">📸 Analisa Tanaman</button>
     <p id="aiResult"></p>
  </div>

  <div class="nav-item">👤</div>
  <div class="nav-item">⚙️</div>

</div>

<script type="module" src="assets/js/start.js"></script>
</body>
</html>
