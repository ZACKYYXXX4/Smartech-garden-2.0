<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Profile - Smartech Garden</title>
  <link rel="stylesheet" href="assets/css/profile.css">
  <link rel="icon" type="image/png" href="assets/images/WhatsApp Image 2025-09-08 at 23.10.24_2c0a5fd1.jpg">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <a href="index.html" class="nav-link">🏠 Dashboard</a>
  <a href="history_pages.html" class="nav-link">📜 History</a>
  <a href="e-book_pages.html" class="nav-link">📖 E-book</a>
  <a href="start_planting.html" class="nav-link">🚀 Mulai Tanam</a>
  <a href="settings.html" class="nav-link">⚙️ Settings</a>
</div>

<!-- Content -->
<div class="main">

  <h1>👤 Profile Pengguna</h1>

  <!-- PROFILE CARD -->
  <div class="profile-card">
    <img id="userPhoto" src="">
    <h2 id="userName">Loading...</h2>
    <p id="userEmail"></p>
    <p id="userUID"></p>

    <!-- ROLE + LEVEL -->
    <div class="user-stats">
      <p id="userRole">Role: Loading...</p>
      <p id="userLevel">Level: 1</p>
      <p id="userXP">XP: 0</p>
    </div>

    <!-- XP BAR -->
    <div class="xp-bar">
      <div id="xpFill"></div>
    </div>

    <!-- DESKRIPSI -->
    <p id="userDesc">Memuat deskripsi...</p>

    <!-- EDIT MODE -->
    <textarea id="descInput" placeholder="Tulis deskripsi kamu..." style="display:none;"></textarea>

    <!-- BUTTON -->
    <div class="desc-buttons">
      <button id="editBtn">✏️ Edit</button>
      <button id="saveBtn" style="display:none;">💾 Simpan</button>
    </div>
  </div>

  <!-- 🔥 QUEST AKTIF -->
  <h2>🔥 Tanaman Aktif</h2>
  <div id="activePlants" class="plant-grid"></div>

  <!-- ✅ QUEST SELESAI -->
  <h2>✅ Tanaman Selesai</h2>
  <div id="completedPlants" class="plant-grid"></div>

  <!-- 📜 HISTORY -->
  <h2>📜 Riwayat Tanam</h2>
  <div id="historyLog" class="plant-grid"></div>

</div>

<script type="module" src="assets/js/profile.js"></script>
  <script>
if (localStorage.getItem("darkMode") === "true") {
  document.body.classList.add("dark");
}
</script>
</body>
</html>
